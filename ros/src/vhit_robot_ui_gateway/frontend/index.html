<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>VHIT Robot UI</title>

  <script type="module" src="/src/main.js"></script>
</head>

<body>
  <main class="application">
    <header class="application-header">
      <div>
        <h1>VHIT ELAC Control</h1>
        <p>Actuator visualization and manual jogging</p>
      </div>

      <div
        id="connection-status"
        class="status disconnected"
      >
        Waiting for feedback
      </div>
    </header>

    <section class="viewer-panel">
      <div class="viewer-toolbar">
        <div>
          <h2>Actuator view</h2>

          <span id="viewer-position">
            Position: -- rad
          </span>
        </div>

        <button
          id="reset-camera"
          type="button"
          class="secondary-button"
        >
          Reset view
        </button>
      </div>

      <div
        id="actuator-viewer"
        class="actuator-viewer"
      >
        <div class="viewer-loading">
          Initializing 3D viewer…
        </div>
      </div>
    </section>

    <section class="control-panel">
      <h2>Jog control</h2>

      <div class="measurement">
        <span>Measured position</span>

        <strong id="joint-position">--</strong>

        <span>rad</span>
      </div>

      <div class="jog-controls">
        <button
          id="jog-negative"
          type="button"
          aria-label="Jog actuator in the negative direction"
        >
          ←
        </button>

        <button
          id="jog-positive"
          type="button"
          aria-label="Jog actuator in the positive direction"
        >
          →
        </button>
      </div>

      <p class="help">
        Use the buttons or the left and right arrow keys.
      </p>

      <p
        id="command-result"
        class="command-result"
        aria-live="polite"
      ></p>
    </section>
    <section class="waypoint-panel">
      <div class="waypoint-header">
        <div>
          <h2>Waypoints</h2>
          <p>
            Store the current measured actuator position.
          </p>
        </div>

        <button
          id="teach-waypoint"
          type="button"
          class="primary-button"
        >
          Teach current position
        </button>
      </div>

      <div class="waypoint-name-row">
        <label for="waypoint-name">
          Waypoint name
        </label>

        <input
          id="waypoint-name"
          type="text"
          placeholder="For example: Position A"
        >
      </div>

      <div
        id="waypoint-list"
        class="waypoint-list"
      ></div>

      <div class="playback-controls">
        <label>
          Move duration
          <input
            id="playback-duration"
            type="number"
            min="0.1"
            step="0.1"
            value="1.0"
          >
        </label>

        <label>
          Hold time
          <input
            id="playback-hold-time"
            type="number"
            min="0"
            step="0.1"
            value="0.2"
          >
        </label>

        <button
          id="play-waypoints"
          type="button"
          class="primary-button"
        >
          Play all
        </button>
      </div>

      <p
        id="waypoint-result"
        class="command-result"
        aria-live="polite"
      ></p>
    </section>
  </main>
</body>
</html>
